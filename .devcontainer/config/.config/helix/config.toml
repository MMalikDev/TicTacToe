theme = "catppuccin_mocha"

[editor]
rulers = [74, 80, 100, 120, 160]
line-number = "relative"
bufferline = "always"
auto-pairs = true
color-modes = true
completion-timeout = 5
completion-trigger-len = 1
cursorline = true
idle-timeout = 250
mouse = true
true-color = true
jump-label-alphabet = "asdfzxcqwervtgbyhnujmikolp"

[editor.soft-wrap]
enable = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
follow-symlinks = true
git-ignore = true
hidden = false
parents = false

[editor.search]
wrap-around = true

[editor.gutters.line-numbers]
min-width = 2

[editor.indent-guides]
character = "|"
render = true
skip-levels = 1

[keys.insert]
C-w = ":w!"

[keys.select]
C-w = ":w!"
y = ["yank", ":clipboard-yank"]
C-A-y = [
  ":echo %sh{ echo '@%{buffer_name}#L%{selection_line_start}-%{selection_line_end}' | dms clipboard copy }",
  ":echo \"Copied @%{buffer_name}#L%{selection_line_start}-%{selection_line_end}\"",
]

[keys.normal]
C-r = [":reload-all"]
C-w = ":w!"
D = "@vgld"
esc = ["collapse_selection", "keep_primary_selection"]
"\\" = "file_explorer_in_current_directory"
S-tab = ":buffer-previous"
tab = ":buffer-next"
Y = "@vgly"
y = ["yank", ":clipboard-yank"]
C-A-y = [
  ":echo %sh{ echo '@%{buffer_name}#L%{selection_line_start}-%{selection_line_end}' | dms clipboard copy }",
  ":echo \"Copied @%{buffer_name}#L%{selection_line_start}-%{selection_line_end}\"",
]

[keys.normal.space]
C-c = ":config-open"
"=" = ":format"
space = "buffer_picker"

[keys.normal.space.b]
d = ":buffer-close!"
o = ":buffer-close-others"
O = ":buffer-close-others!"
w = ":write-buffer-close"

[keys.normal.space.q]
e = ":q!"
q = ":q"
s = ":w"
w = ":wq"

[keys.normal.space.l]
g = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw"]
d = [":new", ":insert-output lazydocker", ":buffer-close!", ":redraw"]
