[git_status]
style = "bg:bg_accent"
format = "[[($all_status$ahead_behind )](fg:txt_accent bg:bg_accent)]($style)"

[status]
disabled = false
map_symbol = true
style = "bg:bg_base"
symbol = "[Ô£ù](bold fg:color_error bg:bg_base)"
sigint_symbol = "[¾░£║](bold fg:color_warning bg:bg_base)"
