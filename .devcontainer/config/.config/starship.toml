format = "[ $user ]($style)"

[sudo]
disabled = false
style = "fg:txt_base bg:bg_base"
format = "[$symbol]($style)"
symbol = "¾▒òÁ "

[directory]
style = "fg:txt_emphasis bg:bg_emphasis"
